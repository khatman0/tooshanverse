<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خزانه | توشان‌ورس</title>
<link rel="icon" href="/photo/favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#04060e;
    --bg2:#070c1a;
    --blue:#19a7ff;
    --blue2:#84dfff;
    --gold:#f0c060;
    --gold2:#ffd777;
    --text:#ddeeff;
    --muted:rgba(210,230,255,.55);
    --line:rgba(25,167,255,.12);
    --card:rgba(8,14,28,.72);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Vazirmatn',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

a{text-decoration:none;color:inherit;}
button{font-family:inherit;border:none;outline:none;cursor:pointer;}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(25,167,255,.015) 1px,transparent 1px),
        linear-gradient(90deg,rgba(25,167,255,.015) 1px,transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
    z-index:-2;
}

.ambient{
    position:fixed;
    top:-220px;
    left:50%;
    transform:translateX(-50%);
    width:700px;
    height:700px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(25,167,255,.08), transparent 70%);
    animation:breathe 10s infinite ease-in-out;
    pointer-events:none;
    z-index:-1;
}

@keyframes breathe{
    0%,100%{opacity:.5;transform:translateX(-50%) scale(1);}
    50%{opacity:1;transform:translateX(-50%) scale(1.12);}
}

header{
    padding:24px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Orbitron',sans-serif;
    font-size:1rem;
    letter-spacing:2px;
    font-weight:800;
    color:var(--blue);
}

.logo span{color:var(--gold);}

.back-link{
    font-size:.85rem;
    color:var(--muted);
    padding:10px 18px;
    border:1px solid var(--line);
    border-radius:999px;
    transition:.25s;
}

.back-link:hover{
    color:var(--blue2);
    border-color:rgba(25,167,255,.35);
}

main{
    max-width:900px;
    margin:0 auto;
    padding:20px 24px 100px;
}

.hero{
    text-align:center;
    padding:40px 20px 50px;
}

.hero-eyebrow{
    font-size:.72rem;
    letter-spacing:4px;
    color:var(--gold);
    margin-bottom:14px;
}

/*═════════ HERO COIN ═════════*/

.hero-coin-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:22px;
}

.hero-coin{
    width:108px;
    height:108px;
    filter:drop-shadow(0 0 14px rgba(255,215,120,.45)) drop-shadow(0 0 26px rgba(25,167,255,.25));
    animation:coinFloat 3.2s ease-in-out infinite;
}

.hero-coin svg{
    width:100%;
    height:100%;
    display:block;
}

@keyframes coinFloat{
    0%,100%{transform:translateY(0) rotate(-1.5deg);}
    50%{transform:translateY(-12px) rotate(1.5deg);}
}

.hero-coin-name{
    margin-top:14px;
    font-family:'Orbitron',sans-serif;
    font-size:.8rem;
    letter-spacing:2px;
    color:var(--gold2);
}

@media (prefers-reduced-motion: reduce){
    .hero-coin{animation:none;}
}

.hero h1{
    font-family:'Orbitron',sans-serif;
    font-size:clamp(2rem,5vw,2.8rem);
    font-weight:900;
}

.hero h1 span{color:var(--blue);}

/*═════════ WALLET ═════════*/

.wallet-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:26px;
    padding:36px;
    backdrop-filter:blur(18px);
    position:relative;
    overflow:hidden;
    margin-bottom:50px;
}

.wallet-card::before{
    content:"";
    position:absolute;
    top:0;left:0;
    width:100%;height:1px;
    background:linear-gradient(90deg,transparent,var(--blue),transparent);
}

.wallet-stats{
    display:flex;
    justify-content:space-around;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.wallet-item{text-align:center;}

.wallet-label{
    display:block;
    font-size:.75rem;
    letter-spacing:2px;
    color:var(--muted);
    margin-bottom:10px;
}

.wallet-item h3{
    font-family:'Orbitron',sans-serif;
    font-size:2.6rem;
    color:var(--gold);
    display:inline-block;
    transform-origin:center;
}

/* پالس ورودی سکه‌ها روی عدد */
.wallet-item h3.bump{
    animation:coinBump .6s cubic-bezier(.34,1.56,.64,1);
}

@keyframes coinBump{
    0%{transform:scale(1);text-shadow:none;}
    35%{transform:scale(1.32);text-shadow:0 0 18px rgba(255,215,120,.85);}
    65%{transform:scale(.94);}
    100%{transform:scale(1);text-shadow:none;}
}

/* درخشش حلقه‌ی خزانه هنگام فرود سکه‌ها */
.wallet-card.receiving::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:26px;
    box-shadow:0 0 0 1px rgba(255,215,120,.5) inset, 0 0 40px rgba(240,192,96,.35);
    animation:receiveFlash .6s ease-out;
    pointer-events:none;
}

@keyframes receiveFlash{
    0%{opacity:0;}
    30%{opacity:1;}
    100%{opacity:0;}
}

.wallet-divider{
    width:1px;
    height:70px;
    background:var(--line);
}

/*═════════ EXCHANGE GRID ═════════*/

.section-title{
    text-align:center;
    margin-bottom:30px;
}

.section-title span{
    font-size:.72rem;
    letter-spacing:3px;
    color:var(--gold);
}

.section-title h2{
    margin-top:8px;
    font-size:1.7rem;
}

.exchange-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:22px;
}

.exchange-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:30px 24px;
    text-align:center;
    transition:.3s;
    position:relative;
    overflow:hidden;
}

.exchange-card::before{
    content:"";
    position:absolute;
    top:0;left:0;
    width:100%;height:1px;
    background:linear-gradient(90deg,transparent,var(--blue),transparent);
}

.exchange-card:hover{
    transform:translateY(-6px);
    border-color:rgba(25,167,255,.35);
    box-shadow:0 20px 45px rgba(0,0,0,.4);
}

.exchange-rate{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin-bottom:22px;
}

.rate-side{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

.rate-num{
    font-family:'Orbitron',sans-serif;
    font-size:1.6rem;
    font-weight:800;
}

.rate-num.xp{color:var(--blue2);}
.rate-num.coin{color:var(--gold);}

.rate-label{
    font-size:.68rem;
    letter-spacing:1px;
    color:var(--muted);
}

.rate-arrow{
    color:var(--muted);
    font-size:1.2rem;
}

.exchange-btn{
    width:100%;
    padding:13px;
    border-radius:14px;
    background:linear-gradient(135deg,var(--blue),#1177dd);
    color:#fff;
    font-weight:700;
    transition:.25s;
    position:relative;
}

.exchange-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 14px 30px rgba(25,167,255,.3);
}

.exchange-btn:disabled{
    opacity:.4;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
}

.best-value{
    position:absolute;
    top:14px;
    left:14px;
    padding:5px 12px;
    border-radius:999px;
    font-size:.62rem;
    font-weight:800;
    letter-spacing:1px;
    background:rgba(240,192,96,.18);
    color:var(--gold2);
    border:1px solid rgba(255,200,90,.35);
}

/*═════════ COIN FLIGHT ═════════*/

#coinFlightLayer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9998;
    overflow:visible;
}

.flying-coin{
    position:absolute;
    top:0;
    left:0;
    width:30px;
    height:30px;
    will-change:transform,opacity;
    filter:drop-shadow(0 0 6px rgba(255,215,120,.65)) drop-shadow(0 0 14px rgba(25,167,255,.25));
}

.flying-coin svg{
    width:100%;
    height:100%;
    display:block;
}

/*═════════ TOAST ═════════*/

.toast{
    position:fixed;
    bottom:35px;
    left:50%;
    transform:translateX(-50%) translateY(100px);
    padding:15px 28px;
    border-radius:14px;
    background:#08111d;
    border:1px solid var(--line);
    color:#fff;
    opacity:0;
    transition:.35s;
    z-index:9999;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

/*═════════ RESPONSIVE ═════════*/

@media(max-width:600px){
    .wallet-stats{flex-direction:column;}
    .wallet-divider{display:none;}
    .wallet-item h3{font-size:2.1rem;}
}

@media (prefers-reduced-motion: reduce){
    .flying-coin{display:none;}
    .wallet-item h3.bump{animation:none;}
}
</style>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
import { SUPABASE_URL, SUPABASE_KEY } from "./supabase-config.js";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let coins = 0;
let xp = 0;

const coinBalance = document.getElementById("coinBalance");
const xpBalance = document.getElementById("xpBalance");
const exchangeGrid = document.getElementById("exchangeGrid");
const walletCard = document.getElementById("walletCard");
const coinFlightLayer = document.getElementById("coinFlightLayer");
const coinTemplate = document.getElementById("coinTemplate");

const toFa = n => Number(n).toLocaleString("fa-IR");

function showToast(text){
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = text;
    document.body.appendChild(toast);
    setTimeout(()=> toast.classList.add("show"), 50);
    setTimeout(()=>{
        toast.classList.remove("show");
        setTimeout(()=> toast.remove(), 300);
    }, 2500);
}

function updateUI(){
    coinBalance.textContent = toFa(coins);
    xpBalance.textContent = toFa(xp);
}

/*═════════ COIN FLIGHT ANIMATION ═════════
   وقتی تبدیل موفق انجام شد، چند سکه از روی دکمه‌ی
   «تبدیل» به سمت عدد Tooshan Coins پرواز می‌کنند،
   حین پرواز می‌چرخند (افکت فلیپ سکه) و روی یک مسیر
   کمانی/پرتابی حرکت می‌کنند. با فرود آخرین سکه،
   عدد خزانه با یک ضربان (bump) و درخشش آپدیت می‌شود.
════════════════════════════════════════════*/

function launchCoinFlight(fromEl, toEl, amountGained, onLanded){
    const fromRect = fromEl.getBoundingClientRect();
    const toRect = toEl.getBoundingClientRect();

    // تعداد سکه‌های پرنده بر اساس مقدار دریافتی، بین ۴ تا ۹ عدد
    const count = Math.min(9, Math.max(4, Math.round(amountGained / 15)));

    const startX = fromRect.left + fromRect.width / 2;
    const startY = fromRect.top + fromRect.height / 2;
    const endX = toRect.left + toRect.width / 2;
    const endY = toRect.top + toRect.height / 2;

    let remaining = count;

    for(let i = 0; i < count; i++){
        const coin = document.createElement("div");
        coin.className = "flying-coin";
        coin.appendChild(coinTemplate.content.cloneNode(true));
        coinFlightLayer.appendChild(coin);

        // پراکندگی کوچک در نقطه‌ی شروع و پایان تا سکه‌ها روی هم نیفتند
        const sx = startX + (Math.random() * 24 - 12);
        const sy = startY + (Math.random() * 14 - 7);
        const ex = endX + (Math.random() * 26 - 13);
        const ey = endY + (Math.random() * 10 - 5);

        // نقطه‌ی میانی مسیر، بالاتر از هر دو سر، برای حس «پریدن» سکه
        const arcHeight = 90 + Math.random() * 70;
        const midX = (sx + ex) / 2 + (Math.random() * 70 - 35);
        const midY = Math.min(sy, ey) - arcHeight;

        const spins = 2 + Math.floor(Math.random() * 2); // ۲ تا ۳ دور چرخش
        const delay = i * 65 + Math.random() * 40;
        const duration = 780 + Math.random() * 260;

        const anim = coin.animate([
            {
                transform: `translate(${sx}px, ${sy}px) scale(.4) rotateY(0deg)`,
                opacity: 0,
                offset: 0
            },
            {
                transform: `translate(${sx}px, ${sy}px) scale(.75) rotateY(${spins * 60}deg)`,
                opacity: 1,
                offset: 0.1
            },
            {
                transform: `translate(${midX}px, ${midY}px) scale(1.05) rotateY(${spins * 220}deg)`,
                opacity: 1,
                offset: 0.55
            },
            {
                transform: `translate(${ex}px, ${ey}px) scale(.3) rotateY(${spins * 360}deg)`,
                opacity: 0,
                offset: 1
            }
        ], {
            duration,
            delay,
            easing: "cubic-bezier(.25,.65,.3,1)",
            fill: "forwards"
        });

        anim.onfinish = () => {
            coin.remove();
            remaining -= 1;
            if(remaining === 0 && onLanded) onLanded();
        };
    }
}

function bumpWalletCoin(){
    coinBalance.classList.remove("bump");
    walletCard.classList.remove("receiving");
    // ری‌فلو اجباری تا انیمیشن از اول اجرا شود، حتی اگر پشت سر هم فعال شود
    void coinBalance.offsetWidth;
    coinBalance.classList.add("bump");
    walletCard.classList.add("receiving");

    setTimeout(() => {
        coinBalance.classList.remove("bump");
        walletCard.classList.remove("receiving");
    }, 650);
}

async function loadProfile(){
    const { data:{ user: currentUser } } = await supabase.auth.getUser();

    if(!currentUser){
        location.href = "login.html";
        return;
    }

    user = currentUser;

    const { data, error } = await supabase
        .from("profiles")
        .select("coins,xp")
        .eq("id", user.id)
        .single();

    if(error){
        console.error(error);
        showToast("خطا در بارگذاری اطلاعات");
        return;
    }

    coins = Number(data.coins) || 0;
    xp = Number(data.xp) || 0;
    updateUI();
}

/*═════════ EXCHANGE RATES ═════════
   نرخ‌های تبدیل از جدول exchange_rates خوانده می‌شود
   تا کاربر نتواند نرخ را دستکاری کند.
════════════════════════════════════*/

async function loadExchangeRates(){
    const { data, error } = await supabase
        .from("exchange_rates")
        .select("*")
        .order("xp_cost", { ascending: true });

    if(error){
        console.error(error);
        showToast("خطا در بارگذاری نرخ‌های تبدیل");
        return;
    }

    exchangeGrid.innerHTML = "";

    data.forEach(rate => {
        const card = document.createElement("div");
        card.className = "exchange-card";

        card.innerHTML = `
            ${rate.is_best_value ? '<div class="best-value">بهترین ارزش</div>' : ""}
            <div class="exchange-rate">
                <div class="rate-side">
                    <span class="rate-num xp">${toFa(rate.xp_cost)}</span>
                    <span class="rate-label">XP</span>
                </div>
                <span class="rate-arrow">←</span>
                <div class="rate-side">
                    <span class="rate-num coin">${toFa(rate.coin_reward)}</span>
                    <span class="rate-label">COIN</span>
                </div>
            </div>
            <button class="exchange-btn" data-rate-id="${rate.id}" data-cost="${rate.xp_cost}">
                تبدیل
            </button>
        `;

        exchangeGrid.appendChild(card);
    });

    refreshButtonStates();
}

function refreshButtonStates(){
    document.querySelectorAll(".exchange-btn").forEach(btn => {
        const cost = Number(btn.dataset.cost);
        btn.disabled = xp < cost;
    });
}

exchangeGrid.addEventListener("click", async e => {
    const btn = e.target.closest(".exchange-btn");
    if(!btn || btn.disabled) return;

    btn.disabled = true;

    const { data, error } = await supabase.rpc("convert_xp", {
        p_rate_id: btn.dataset.rateId
    });

    if(error){
        console.error(error);
        showToast(error.message || "خطا در تبدیل");
        refreshButtonStates();
        return;
    }

    xp = data.xp;
    coins = data.coins;

    // XP بلافاصله آپدیت می‌شود (چون همان لحظه کم می‌شود)
    xpBalance.textContent = toFa(xp);
    refreshButtonStates();

    // سکه‌ها از روی همین دکمه به سمت عدد Tooshan Coins پرواز می‌کنند
    launchCoinFlight(btn, coinBalance, data.coins_gained, () => {
        coinBalance.textContent = toFa(coins);
        bumpWalletCoin();
    });

    showToast(`+${toFa(data.coins_gained)} سکه دریافت شد`);
});

window.addEventListener("load", async () => {
    await loadProfile();
    await loadExchangeRates();
});
</script>
