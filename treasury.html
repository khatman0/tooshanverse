<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خزانه | توشان‌ورس</title>
<link rel="icon" href="/photo/favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#04060e;
    --bg2:#070c1a;
    --blue:#19a7ff;
    --blue2:#84dfff;
    --gold:#f0c060;
    --gold2:#ffd777;
    --text:#ddeeff;
    --muted:rgba(210,230,255,.55);
    --line:rgba(25,167,255,.12);
    --card:rgba(8,14,28,.72);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Vazirmatn',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

a{text-decoration:none;color:inherit;}
button{font-family:inherit;border:none;outline:none;cursor:pointer;}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(25,167,255,.015) 1px,transparent 1px),
        linear-gradient(90deg,rgba(25,167,255,.015) 1px,transparent 1px);
    background-size:60px 60px;
    pointer-events:none;
    z-index:-2;
}

.ambient{
    position:fixed;
    top:-220px;
    left:50%;
    transform:translateX(-50%);
    width:700px;
    height:700px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(25,167,255,.08), transparent 70%);
    animation:breathe 10s infinite ease-in-out;
    pointer-events:none;
    z-index:-1;
}

@keyframes breathe{
    0%,100%{opacity:.5;transform:translateX(-50%) scale(1);}
    50%{opacity:1;transform:translateX(-50%) scale(1.12);}
}

header{
    padding:24px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Orbitron',sans-serif;
    font-size:1rem;
    letter-spacing:2px;
    font-weight:800;
    color:var(--blue);
}

.logo span{color:var(--gold);}

.back-link{
    font-size:.85rem;
    color:var(--muted);
    padding:10px 18px;
    border:1px solid var(--line);
    border-radius:999px;
    transition:.25s;
}

.back-link:hover{
    color:var(--blue2);
    border-color:rgba(25,167,255,.35);
}

main{
    max-width:900px;
    margin:0 auto;
    padding:20px 24px 100px;
}

.hero{
    text-align:center;
    padding:40px 20px 50px;
}

.hero-eyebrow{
    font-size:.72rem;
    letter-spacing:4px;
    color:var(--gold);
    margin-bottom:14px;
}

.hero h1{
    font-family:'Orbitron',sans-serif;
    font-size:clamp(2rem,5vw,2.8rem);
    font-weight:900;
}

.hero h1 span{color:var(--blue);}

/*═════════ WALLET ═════════*/

.wallet-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:26px;
    padding:36px;
    backdrop-filter:blur(18px);
    position:relative;
    overflow:hidden;
    margin-bottom:50px;
}

.wallet-card::before{
    content:"";
    position:absolute;
    top:0;left:0;
    width:100%;height:1px;
    background:linear-gradient(90deg,transparent,var(--blue),transparent);
}

.wallet-stats{
    display:flex;
    justify-content:space-around;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.wallet-item{text-align:center;}

.wallet-label{
    display:block;
    font-size:.75rem;
    letter-spacing:2px;
    color:var(--muted);
    margin-bottom:10px;
}

.wallet-item h3{
    font-family:'Orbitron',sans-serif;
    font-size:2.6rem;
    color:var(--gold);
}

.wallet-divider{
    width:1px;
    height:70px;
    background:var(--line);
}

/*═════════ EXCHANGE GRID ═════════*/

.section-title{
    text-align:center;
    margin-bottom:30px;
}

.section-title span{
    font-size:.72rem;
    letter-spacing:3px;
    color:var(--gold);
}

.section-title h2{
    margin-top:8px;
    font-size:1.7rem;
}

.exchange-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:22px;
}

.exchange-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:30px 24px;
    text-align:center;
    transition:.3s;
    position:relative;
    overflow:hidden;
}

.exchange-card::before{
    content:"";
    position:absolute;
    top:0;left:0;
    width:100%;height:1px;
    background:linear-gradient(90deg,transparent,var(--blue),transparent);
}

.exchange-card:hover{
    transform:translateY(-6px);
    border-color:rgba(25,167,255,.35);
    box-shadow:0 20px 45px rgba(0,0,0,.4);
}

.exchange-rate{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin-bottom:22px;
}

.rate-side{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

.rate-num{
    font-family:'Orbitron',sans-serif;
    font-size:1.6rem;
    font-weight:800;
}

.rate-num.xp{color:var(--blue2);}
.rate-num.coin{color:var(--gold);}

.rate-label{
    font-size:.68rem;
    letter-spacing:1px;
    color:var(--muted);
}

.rate-arrow{
    color:var(--muted);
    font-size:1.2rem;
}

.exchange-btn{
    width:100%;
    padding:13px;
    border-radius:14px;
    background:linear-gradient(135deg,var(--blue),#1177dd);
    color:#fff;
    font-weight:700;
    transition:.25s;
}

.exchange-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 14px 30px rgba(25,167,255,.3);
}

.exchange-btn:disabled{
    opacity:.4;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
}

.best-value{
    position:absolute;
    top:14px;
    left:14px;
    padding:5px 12px;
    border-radius:999px;
    font-size:.62rem;
    font-weight:800;
    letter-spacing:1px;
    background:rgba(240,192,96,.18);
    color:var(--gold2);
    border:1px solid rgba(255,200,90,.35);
}

/*═════════ TOAST ═════════*/

.toast{
    position:fixed;
    bottom:35px;
    left:50%;
    transform:translateX(-50%) translateY(100px);
    padding:15px 28px;
    border-radius:14px;
    background:#08111d;
    border:1px solid var(--line);
    color:#fff;
    opacity:0;
    transition:.35s;
    z-index:9999;
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

/*═════════ RESPONSIVE ═════════*/

@media(max-width:600px){
    .wallet-stats{flex-direction:column;}
    .wallet-divider{display:none;}
    .wallet-item h3{font-size:2.1rem;}
}
</style>
</head>
<body>

<div class="ambient"></div>

<header>
    <div class="logo">توشان<span>‌</span>ورس</div>
    <a class="back-link" href="index.html">بازگشت به خانه</a>
</header>

<main>

    <section class="hero">
        <div class="hero-eyebrow">YOUR TREASURY</div>
        <h1>خزانه <span>شخصی</span></h1>
    </section>

    <section class="wallet-card">
        <div class="wallet-stats">
            <div class="wallet-item">
                <span class="wallet-label">TOOSHAN COINS</span>
                <h3 id="coinBalance">۰</h3>
            </div>
            <div class="wallet-divider"></div>
            <div class="wallet-item">
                <span class="wallet-label">XP</span>
                <h3 id="xpBalance">۰</h3>
            </div>
        </div>
    </section>

    <div class="section-title">
        <span>EXCHANGE</span>
        <h2>تبدیل امتیاز به سکه</h2>
    </div>

    <div class="exchange-grid" id="exchangeGrid">
        <!-- کارت‌ها با جاوااسکریپت از دیتابیس پر می‌شوند -->
    </div>

</main>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
import { SUPABASE_URL, SUPABASE_KEY } from "./supabase-config.js";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let coins = 0;
let xp = 0;

const coinBalance = document.getElementById("coinBalance");
const xpBalance = document.getElementById("xpBalance");
const exchangeGrid = document.getElementById("exchangeGrid");

const toFa = n => Number(n).toLocaleString("fa-IR");

function showToast(text){
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = text;
    document.body.appendChild(toast);
    setTimeout(()=> toast.classList.add("show"), 50);
    setTimeout(()=>{
        toast.classList.remove("show");
        setTimeout(()=> toast.remove(), 300);
    }, 2500);
}

function updateUI(){
    coinBalance.textContent = toFa(coins);
    xpBalance.textContent = toFa(xp);
}

async function loadProfile(){
    const { data:{ user: currentUser } } = await supabase.auth.getUser();

    if(!currentUser){
        location.href = "login.html";
        return;
    }

    user = currentUser;

    const { data, error } = await supabase
        .from("profiles")
        .select("coins,xp")
        .eq("id", user.id)
        .single();

    if(error){
        console.error(error);
        showToast("خطا در بارگذاری اطلاعات");
        return;
    }

    coins = Number(data.coins) || 0;
    xp = Number(data.xp) || 0;
    updateUI();
}

/*═════════ EXCHANGE RATES ═════════
   نرخ‌های تبدیل از جدول exchange_rates خوانده می‌شود
   تا کاربر نتواند نرخ را دستکاری کند.
════════════════════════════════════*/

async function loadExchangeRates(){
    const { data, error } = await supabase
        .from("exchange_rates")
        .select("*")
        .order("xp_cost", { ascending: true });

    if(error){
        console.error(error);
        showToast("خطا در بارگذاری نرخ‌های تبدیل");
        return;
    }

    exchangeGrid.innerHTML = "";

    data.forEach(rate => {
        const card = document.createElement("div");
        card.className = "exchange-card";

        card.innerHTML = `
            ${rate.is_best_value ? '<div class="best-value">بهترین ارزش</div>' : ""}
            <div class="exchange-rate">
                <div class="rate-side">
                    <span class="rate-num xp">${toFa(rate.xp_cost)}</span>
                    <span class="rate-label">XP</span>
                </div>
                <span class="rate-arrow">→</span>
                <div class="rate-side">
                    <span class="rate-num coin">${toFa(rate.coin_reward)}</span>
                    <span class="rate-label">COIN</span>
                </div>
            </div>
            <button class="exchange-btn" data-rate-id="${rate.id}" data-cost="${rate.xp_cost}">
                تبدیل
            </button>
        `;

        exchangeGrid.appendChild(card);
    });

    refreshButtonStates();
}

function refreshButtonStates(){
    document.querySelectorAll(".exchange-btn").forEach(btn => {
        const cost = Number(btn.dataset.cost);
        btn.disabled = xp < cost;
    });
}

exchangeGrid.addEventListener("click", async e => {
    const btn = e.target.closest(".exchange-btn");
    if(!btn || btn.disabled) return;

    btn.disabled = true;

    const { data, error } = await supabase.rpc("convert_xp", {
        p_rate_id: btn.dataset.rateId
    });

    if(error){
        console.error(error);
        showToast(error.message || "خطا در تبدیل");
        refreshButtonStates();
        return;
    }

    coins = data.coins;
    xp = data.xp;
    updateUI();
    refreshButtonStates();

    showToast(`+${toFa(data.coins_gained)} سکه دریافت شد`);
});

window.addEventListener("load", async () => {
    await loadProfile();
    await loadExchangeRates();
});
</script>

</body>
</html>
