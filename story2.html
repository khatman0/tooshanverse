<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الکتروپالس - ارتباط الکتریکی</title>
  <link rel="icon" href="/photo/favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #05070f;
  --surface:   #090c18;
  --blue:      #19a7ff;
  --blue-dim:  rgba(25,167,255,0.15);
  --blue-glow: rgba(25,167,255,0.06);
  --text:      #ddeeff;
  --muted:     rgba(180,210,255,0.55);
  --line:      rgba(25,167,255,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Vazirmatn', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ─── NOISE OVERLAY ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* ─── AMBIENT GLOW ─── */
.ambient {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(25,167,255,0.07), transparent 70%);
  pointer-events: none;
  z-index: 0;
  transition: transform 1.2s ease;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  animation: breathe 8s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50%      { opacity: 1;   transform: translateX(-50%) scale(1.15); }
}

/* ─── BACK BUTTON ─── */
.back {
  position: fixed;
  top: 20px; left: 20px;
  z-index: 50;
  display: flex; align-items: center; gap: 8px;
  color: var(--blue);
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  padding: 8px 14px;
  border: 1px solid var(--line);
  border-radius: 30px;
  background: rgba(9,12,24,0.8);
  backdrop-filter: blur(12px);
  transition: all .25s;
}
.back:hover {
  background: var(--blue-dim);
  border-color: rgba(25,167,255,0.3);
}
.back svg { width: 14px; height: 14px; }

/* ─── PROGRESS BAR ─── */
#progress {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  width: 0%;
  background: linear-gradient(90deg, var(--blue), #9be3ff);
  z-index: 100;
  transition: width .1s linear;
  box-shadow: 0 0 10px rgba(25,167,255,0.6);
}

/* ─── HERO ─── */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 24px 60px;
  overflow: hidden;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--blue);
  border: 1px solid var(--line);
  padding: 6px 16px;
  border-radius: 20px;
  background: var(--blue-glow);
  margin-bottom: 32px;
  animation: fadeUp .8s ease both;
}
.hero-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--blue);
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.7); }
}

.hero h1 {
  font-size: clamp(2.8rem, 7vw, 5.5rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -1px;
  color: #fff;
  animation: fadeUp .8s .1s ease both;
}
.hero h1 span {
  color: var(--blue);
  display: block;
  font-size: clamp(1.6rem, 4vw, 3rem);
  font-weight: 300;
  letter-spacing: 1px;
  margin-top: 8px;
}

.hero-meta {
  display: flex;
  gap: 24px;
  align-items: center;
  justify-content: center;
  margin-top: 32px;
  color: var(--muted);
  font-size: 0.88rem;
  animation: fadeUp .8s .2s ease both;
}
.hero-meta span {
  display: flex; align-items: center; gap: 6px;
}
.hero-meta span::before {
  content: '·';
  opacity: 0.4;
}
.hero-meta span:first-child::before { display: none; }

.scroll-hint {
  position: absolute;
  bottom: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 0.78rem;
  animation: fadeUp .8s .4s ease both;
}
.scroll-hint .line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--blue), transparent);
  animation: scrollLine 2s ease-in-out infinite;
}
@keyframes scrollLine {
  0%   { transform: scaleY(0); transform-origin: top; }
  50%  { transform: scaleY(1); transform-origin: top; }
  51%  { transform-origin: bottom; }
  100% { transform: scaleY(0); transform-origin: bottom; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── DIVIDER ─── */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  opacity: 0.2;
  margin: 0;
}

/* ─── STORY WRAPPER ─── */
.story-wrap {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 80px 32px 120px;
}

/* ─── CHAPTER MARKER ─── */
.chapter {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 64px 0 32px;
  opacity: 0;
  transform: translateY(16px);
  transition: all .7s ease;
}
.chapter.visible { opacity: 1; transform: none; }

.chapter-num {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--blue);
  white-space: nowrap;
}
.chapter-line {
  flex: 1;
  height: 1px;
  background: var(--line);
}
.chapter-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
}

/* ─── PARAGRAPHS ─── */
.story-wrap p {
  font-size: 1.05rem;
  line-height: 2.1;
  color: rgba(200,225,255,0.82);
  margin-bottom: 22px;
  opacity: 0;
  transform: translateY(12px);
  transition: all .6s ease;
}
.story-wrap p.visible {
  opacity: 1;
  transform: none;
}

/* ─── DIALOGUE ─── */
.dialogue {
  position: relative;
  margin: 28px 0;
  padding: 20px 24px 20px 20px;
  background: rgba(25,167,255,0.04);
  border-right: 3px solid var(--blue);
  border-radius: 0 12px 12px 0;
  font-size: 1rem;
  line-height: 1.9;
  color: var(--text);
  opacity: 0;
  transform: translateX(16px);
  transition: all .6s ease;
}
.dialogue.visible {
  opacity: 1;
  transform: none;
}
.dialogue .speaker {
  display: block;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--blue);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.dialogue.inner {
  border-color: rgba(155,227,255,0.4);
  background: rgba(155,227,255,0.03);
  font-style: italic;
  color: var(--muted);
}
.dialogue.inner .speaker { color: rgba(155,227,255,0.6); }

/* ─── TIME BREAK ─── */
.timebreak {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 48px 0;
  opacity: 0;
  transition: opacity .6s ease;
}
.timebreak.visible { opacity: 1; }
.timebreak span {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--blue);
  white-space: nowrap;
}
.timebreak .tl { flex: 1; height: 1px; background: var(--line); }

/* ─── HIGHLIGHT BOX ─── */
.highlight {
  margin: 36px 0;
  padding: 24px 28px;
  background: linear-gradient(135deg, rgba(25,167,255,0.06), rgba(25,167,255,0.02));
  border: 1px solid var(--line);
  border-radius: 16px;
  font-size: 1.05rem;
  line-height: 2;
  color: #c8e4ff;
  opacity: 0;
  transform: translateY(12px);
  transition: all .6s ease;
}
.highlight.visible { opacity: 1; transform: none; }

/* ─── ACTION BEAT ─── */
.action {
  font-size: 0.88rem;
  font-weight: 600;
  letter-spacing: 1px;
  color: rgba(255,80,80,0.8);
  text-align: center;
  margin: 32px 0;
  opacity: 0;
  transition: opacity .6s ease;
  text-transform: uppercase;
}
.action.visible { opacity: 1; }

/* ─── END MARKER ─── */
.story-end {
  margin-top: 80px;
  text-align: center;
  opacity: 0;
  transition: opacity .8s ease;
}
.story-end.visible { opacity: 1; }
.story-end .line-dec {
  width: 60px; height: 1px;
  background: var(--blue);
  margin: 0 auto 20px;
  opacity: 0.4;
}
.story-end p {
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 2px;
  opacity: 1 !important;
  transform: none !important;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  .story-wrap { padding: 60px 20px 80px; }
  .story-wrap p { font-size: 0.98rem; line-height: 2; }
  .dialogue { padding: 16px 18px; }
  .back { font-size: 0.8rem; padding: 7px 12px; }
}
</style>
</head>
<body>

<div id="progress"></div>
<div class="ambient"></div>

<a href="phase.html" class="back">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M5 12h14M12 5l7 7-7 7"/>
  </svg>
  بازگشت
</a>

<!-- ─── HERO ─── -->
<section class="hero">
  <div class="hero-badge">توشان‌ورس — فاز یک</div>
  <h1>
الکتروپالس
    <span>ولتاژ ناشناخته</span>
  </h1>
  <div class="hero-meta">
    <span>شایان نظری</span>
    <span>ژنرال کیانفر</span>
    <span>تهران</span>
  </div>
  <div class="scroll-hint">
    <div class="line"></div>
    بخوانید
  </div>
</section>

<div class="divider"></div>

<!-- ─── STORY ─── -->
<div class="story-wrap">

  <div class="chapter">
    <span class="chapter-num">فصل ۰۱</span>
    <span class="chapter-line"></span>
    <span class="chapter-title">اردوی دانشگاه</span>
  </div>

  <div class="story-end">
    <div class="line-dec"></div>
    <p>انتشار به زودی</p>
  </div>

</div>

<script>
// ─── PROGRESS BAR ───
const bar = document.getElementById('progress');
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  bar.style.width = pct + '%';
});

// ─── REVEAL ON SCROLL ───
const reveals = document.querySelectorAll('p, .dialogue, .chapter, .timebreak, .highlight, .action, .story-end');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

reveals.forEach((el, i) => {
  el.style.transitionDelay = (i % 3) * 0.05 + 's';
  observer.observe(el);
});

// ─── AMBIENT FOLLOW ───
const amb = document.querySelector('.ambient');
let ty = 0;
window.addEventListener('scroll', () => {
  ty = window.scrollY * 0.15;
  amb.style.transform = `translateX(-50%) translateY(${ty}px)`;
});
</script>
</body>
</html>
