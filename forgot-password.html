<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>فراموشی رمز عبور | توشان‌ورس</title>
<link rel="icon" href="/photo/favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #04060e;
  --blue:     #19a7ff;
  --blue2:    #9be3ff;
  --gold:     #f0c060;
  --text:     #ddeeff;
  --muted:    rgba(180,210,255,0.5);
  --line:     rgba(25,167,255,0.1);
  --card:     rgba(8,14,28,0.7);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Vazirmatn', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(25,167,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(25,167,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}
.orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.orb-1 { width: 500px; height: 500px; top: -180px; right: -120px;
  background: radial-gradient(circle, rgba(25,167,255,0.1), transparent 65%); }
.orb-2 { width: 400px; height: 400px; bottom: -140px; left: -80px;
  background: radial-gradient(circle, rgba(240,192,96,0.07), transparent 65%); }

a { color: inherit; text-decoration: none; }

.logo-link {
  position: absolute; top: 24px; right: 24px; z-index: 2;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem; font-weight: 700; letter-spacing: 2px;
  color: var(--blue);
}
.logo-link span { color: var(--gold); }

.auth-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 24px;
  backdrop-filter: blur(20px);
  padding: 48px 40px;
  overflow: hidden;
  animation: fadeUp .6s ease both;
}
.auth-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

.auth-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 4px;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 14px;
}
.auth-eyebrow::before { content: ''; height: 1px; width: 20px; background: var(--gold); opacity: .6; }

.auth-card h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem; font-weight: 700; color: #fff;
  margin-bottom: 8px;
}
.auth-card .sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 32px; line-height: 1.8; }

.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 0.82rem; color: var(--blue2);
  margin-bottom: 8px; font-weight: 600;
}
.field input {
  width: 100%;
  padding: 13px 16px;
  background: rgba(25,167,255,0.04);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Vazirmatn', sans-serif;
  font-size: 0.92rem;
  outline: none;
  transition: all .2s ease;
}
.field input::placeholder { color: rgba(180,210,255,0.3); }
.field input:focus {
  border-color: rgba(25,167,255,0.5);
  background: rgba(25,167,255,0.07);
  box-shadow: 0 0 0 3px rgba(25,167,255,0.08);
}

.field-hint { font-size: 0.72rem; color: var(--muted); margin-top: 6px; }

.btn {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 20px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 0.92rem;
  border: none;
  cursor: pointer;
  transition: all .25s ease;
  font-family: 'Vazirmatn', sans-serif;
}
.btn.primary {
  background: linear-gradient(135deg, var(--blue), #1fb6ff);
  color: #001828;
  box-shadow: 0 8px 30px rgba(25,167,255,0.25), 0 0 0 1px rgba(25,167,255,0.3);
  margin-top: 8px;
}
.btn.primary:hover { transform: translateY(-2px); }
.btn.primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

.msg {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 0.85rem;
  line-height: 1.7;
  display: none;
}
.msg.error { background: rgba(255,64,96,0.08); border: 1px solid rgba(255,64,96,0.25); color: #ff8fa3; }
.msg.success { background: rgba(25,167,255,0.08); border: 1px solid rgba(25,167,255,0.25); color: var(--blue2); }

.switch-line {
  text-align: center;
  margin-top: 28px;
  font-size: 0.85rem;
  color: var(--muted);
}
.switch-line a { color: var(--blue); font-weight: 700; }
.switch-line a:hover { color: var(--blue2); }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,24,40,0.3);
  border-top-color: #001828;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<a class="logo-link" href="/index.html">توشان<span>‌</span>ورس</a>

<div class="auth-card">
  <div class="auth-eyebrow">بازیابی حساب</div>

  <!-- مرحله ۱: گرفتن ایمیل -->
  <div id="stepEmail">
    <h1>رمز عبورت رو فراموش کردی؟</h1>
    <p class="sub">ایمیلت رو وارد کن، یه کد بازیابی برات می‌فرستیم.</p>

    <form id="emailForm">
      <div class="field">
        <label for="email">ایمیل</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <button type="submit" class="btn primary" id="sendBtn">
        <span class="spinner" id="sendSpinner"></span>
        <span id="sendBtnText">ارسال کد بازیابی</span>
      </button>
    </form>
  </div>

  <!-- مرحله ۲: وارد کردن کد + رمز جدید -->
  <div id="stepCode" style="display:none;">
    <h1>کد رو وارد کن</h1>
    <p class="sub">کد بازیابی رو که به ایمیلت فرستادیم، همراه رمز جدیدت وارد کن.</p>

    <form id="codeForm">
      <div class="field">
        <label for="code">کد بازیابی</label>
        <input type="text" id="code" placeholder="مثلاً 123456" required autocomplete="one-time-code" inputmode="numeric">
      </div>
      <div class="field">
        <label for="newPassword">رمز عبور جدید</label>
        <input type="password" id="newPassword" placeholder="حداقل ۶ کاراکتر" required minlength="6" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirmPassword">تکرار رمز عبور</label>
        <input type="password" id="confirmPassword" placeholder="حداقل ۶ کاراکتر" required minlength="6" autocomplete="new-password">
        <div class="field-hint">باید دقیقاً مثل بالا باشه</div>
      </div>

      <button type="submit" class="btn primary" id="verifyBtn">
        <span class="spinner" id="verifySpinner"></span>
        <span id="verifyBtnText">تأیید و ساخت رمز جدید</span>
      </button>
    </form>

    <p class="switch-line" style="margin-top:16px;">
      <a href="#" id="backToEmail">ایمیل رو اشتباه وارد کردم</a>
    </p>
  </div>

  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>

  <p class="switch-line">یادت اومد؟ <a href="/login.html">وارد شو</a></p>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import { SUPABASE_URL, SUPABASE_KEY } from '/supabase-config.js';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const stepEmail = document.getElementById('stepEmail');
const stepCode = document.getElementById('stepCode');
const errorMsg = document.getElementById('errorMsg');
const successMsg = document.getElementById('successMsg');

const sendBtn = document.getElementById('sendBtn');
const sendBtnText = document.getElementById('sendBtnText');
const sendSpinner = document.getElementById('sendSpinner');

const verifyBtn = document.getElementById('verifyBtn');
const verifyBtnText = document.getElementById('verifyBtnText');
const verifySpinner = document.getElementById('verifySpinner');

let savedEmail = '';

function showError(text) {
  errorMsg.textContent = text;
  errorMsg.style.display = 'block';
  successMsg.style.display = 'none';
}
function showSuccess(text) {
  successMsg.textContent = text;
  successMsg.style.display = 'block';
  errorMsg.style.display = 'none';
}
function clearMsgs() {
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';
}
function setSending(loading) {
  sendBtn.disabled = loading;
  sendSpinner.style.display = loading ? 'inline-block' : 'none';
  sendBtnText.textContent = loading ? 'در حال ارسال...' : 'ارسال کد بازیابی';
}
function setVerifying(loading) {
  verifyBtn.disabled = loading;
  verifySpinner.style.display = loading ? 'inline-block' : 'none';
  verifyBtnText.textContent = loading ? 'در حال بررسی...' : 'تأیید و ساخت رمز جدید';
}

// ── مرحله ۱: ارسال کد ──
document.getElementById('emailForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMsgs();
  setSending(true);

  const email = document.getElementById('email').value.trim();

  const { error } = await supabase.auth.resetPasswordForEmail(email);

  setSending(false);

  if (error) {
    showError('خطا: ' + error.message);
    return;
  }

  savedEmail = email;
  stepEmail.style.display = 'none';
  stepCode.style.display = 'block';
  showSuccess('کد بازیابی به ' + email + ' فرستاده شد. صندوق ایمیلت (و اسپم) رو چک کن.');
});

// ── مرحله ۲: تأیید کد + رمز جدید ──
document.getElementById('codeForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMsgs();

  const code = document.getElementById('code').value.trim();
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (newPassword !== confirmPassword) {
    showError('رمز عبورها با هم یکی نیستن.');
    return;
  }

  setVerifying(true);

  // ۱. کد رو با ایمیل تأیید می‌کنیم که یه نشست موقت بسازه
  const { error: verifyError } = await supabase.auth.verifyOtp({
    email: savedEmail,
    token: code,
    type: 'recovery'
  });

  if (verifyError) {
    setVerifying(false);
    showError('کد اشتباه یا منقضی شده. دوباره امتحان کن.');
    return;
  }

  // ۲. حالا که نشست معتبره، رمز جدید رو ثبت می‌کنیم
  const { error: updateError } = await supabase.auth.updateUser({ password: newPassword });

  setVerifying(false);

  if (updateError) {
    showError('خطا در ثبت رمز جدید: ' + updateError.message);
    return;
  }

  showSuccess('رمزت با موفقیت عوض شد! در حال انتقال به صفحه‌ی ورود...');
  await supabase.auth.signOut();
  setTimeout(() => { window.location.href = '/login.html'; }, 1800);
});

// ── برگشت به مرحله‌ی ایمیل ──
document.getElementById('backToEmail').addEventListener('click', (e) => {
  e.preventDefault();
  clearMsgs();
  stepCode.style.display = 'none';
  stepEmail.style.display = 'block';
});
</script>
</body>
</html>
