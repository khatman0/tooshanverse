<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ثبت‌نام | توشان‌ورس</title>
<link rel="icon" href="/photo/favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #04060e;
  --blue:     #19a7ff;
  --blue2:    #9be3ff;
  --gold:     #f0c060;
  --red:      #ff4060;
  --text:     #ddeeff;
  --muted:    rgba(180,210,255,0.5);
  --line:     rgba(25,167,255,0.1);
  --card:     rgba(8,14,28,0.7);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Vazirmatn', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(25,167,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(25,167,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}
.orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
.orb-1 { width: 500px; height: 500px; top: -180px; right: -120px;
  background: radial-gradient(circle, rgba(25,167,255,0.1), transparent 65%); }
.orb-2 { width: 400px; height: 400px; bottom: -140px; left: -80px;
  background: radial-gradient(circle, rgba(240,192,96,0.07), transparent 65%); }

a { color: inherit; text-decoration: none; }

.logo-link {
  position: absolute; top: 24px; right: 24px; z-index: 2;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem; font-weight: 700; letter-spacing: 2px;
  color: var(--blue);
}
.logo-link span { color: var(--gold); }

.auth-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 24px;
  backdrop-filter: blur(20px);
  padding: 48px 40px;
  overflow: hidden;
  animation: fadeUp .6s ease both;
}
.auth-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

.auth-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 4px;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 14px;
}
.auth-eyebrow::before { content: ''; height: 1px; width: 20px; background: var(--gold); opacity: .6; }

.auth-card h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.6rem; font-weight: 700; color: #fff;
  margin-bottom: 8px;
}
.auth-card .sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 32px; }

.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 0.82rem; color: var(--blue2);
  margin-bottom: 8px; font-weight: 600;
}
.field input {
  width: 100%;
  padding: 13px 16px;
  background: rgba(25,167,255,0.04);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Vazirmatn', sans-serif;
  font-size: 0.92rem;
  outline: none;
  transition: all .2s ease;
}
.field input::placeholder { color: rgba(180,210,255,0.3); }
.field input:focus {
  border-color: rgba(25,167,255,0.5);
  background: rgba(25,167,255,0.07);
  box-shadow: 0 0 0 3px rgba(25,167,255,0.08);
}
.field-hint { font-size: 0.72rem; color: var(--muted); margin-top: 6px; }

.btn {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 20px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 0.92rem;
  border: none;
  cursor: pointer;
  transition: all .25s ease;
  font-family: 'Vazirmatn', sans-serif;
}
.btn.primary {
  background: linear-gradient(135deg, var(--blue), #1fb6ff);
  color: #001828;
  box-shadow: 0 8px 30px rgba(25,167,255,0.25), 0 0 0 1px rgba(25,167,255,0.3);
  margin-top: 8px;
}
.btn.primary:hover { transform: translateY(-2px); }
.btn.primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

.btn.google {
  background: rgba(255,255,255,0.04);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.12);
  margin-top: 14px;
}
.btn.google:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
.btn.google svg { width: 18px; height: 18px; }

.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 24px 0 0;
  font-size: 0.75rem; color: var(--muted);
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }

.msg {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 0.85rem;
  line-height: 1.7;
  display: none;
}
.msg.error { background: rgba(255,64,96,0.08); border: 1px solid rgba(255,64,96,0.25); color: #ff8fa3; }
.msg.success { background: rgba(25,167,255,0.08); border: 1px solid rgba(25,167,255,0.25); color: var(--blue2); }

.switch-line {
  text-align: center;
  margin-top: 28px;
  font-size: 0.85rem;
  color: var(--muted);
}
.switch-line a { color: var(--blue); font-weight: 700; }
.switch-line a:hover { color: var(--blue2); }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,24,40,0.3);
  border-top-color: #001828;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<a class="logo-link" href="index.html">توشان<span>‌</span>ورس</a>

<div class="auth-card">
  <div class="auth-eyebrow">پیوستن به جهان</div>
  <h1>بساز حسابتو</h1>
  <p class="sub">به جامعه‌ی توشان‌ورس بپیوند و به بخش‌های اختصاصی دسترسی پیدا کن</p>

  <form id="signupForm">
    <div class="field">
      <label for="displayName">نام نمایشی</label>
      <input type="text" id="displayName" placeholder="مثلاً رضا" required autocomplete="name">
    </div>
    <div class="field">
      <label for="email">ایمیل</label>
      <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">رمز عبور</label>
      <input type="password" id="password" placeholder="حداقل ۶ کاراکتر" required minlength="6" autocomplete="new-password">
      <div class="field-hint">حداقل ۶ کاراکتر</div>
    </div>

    <button type="submit" class="btn primary" id="signupBtn">
      <span class="spinner" id="signupSpinner"></span>
      <span id="signupBtnText">ساخت حساب</span>
    </button>
  </form>

  <div class="divider">یا</div>

  <button type="button" class="btn google" id="googleBtn">
    <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.4 18.9 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6 29.6 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.5-2.1 14.2-5.6l-6.6-5.4C29.6 34.9 27 36 24 36c-5.3 0-9.7-3.4-11.3-8.1l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.6 5.4C41.4 36.3 44 30.7 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
    ثبت‌نام با گوگل
  </button>

  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>

  <p class="switch-line">حساب داری؟ <a href="login.html">وارد شو</a></p>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import { SUPABASE_URL, SUPABASE_KEY } from './supabase-config.js';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const form = document.getElementById('signupForm');
const errorMsg = document.getElementById('errorMsg');
const successMsg = document.getElementById('successMsg');
const signupBtn = document.getElementById('signupBtn');
const signupBtnText = document.getElementById('signupBtnText');
const signupSpinner = document.getElementById('signupSpinner');
const googleBtn = document.getElementById('googleBtn');

function showError(text) {
  errorMsg.textContent = text;
  errorMsg.style.display = 'block';
  successMsg.style.display = 'none';
}
function showSuccess(text) {
  successMsg.textContent = text;
  successMsg.style.display = 'block';
  errorMsg.style.display = 'none';
}
function setLoading(loading) {
  signupBtn.disabled = loading;
  signupSpinner.style.display = loading ? 'inline-block' : 'none';
  signupBtnText.textContent = loading ? 'در حال ساخت...' : 'ساخت حساب';
}

supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'profile.html';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';
  setLoading(true);

  const displayName = document.getElementById('displayName').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: { display_name: displayName },
      emailRedirectTo: window.location.origin + '/login.html'
    }
  });

  setLoading(false);

  if (error) {
    if (error.message.includes('already registered') || error.message.includes('User already registered')) {
      showError('این ایمیل قبلاً ثبت‌نام کرده. وارد شو.');
    } else {
      showError('خطا: ' + error.message);
    }
    return;
  }

  showSuccess('ثبت‌نام موفق! یه ایمیل تأیید برات فرستاده شد، صندوق ایمیلتو چک کن.');
  form.reset();
});

googleBtn.addEventListener('click', async () => {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/profile.html' }
  });
  if (error) showError('خطا در ثبت‌نام با گوگل: ' + error.message);
});
</script>
</body>
</html>
